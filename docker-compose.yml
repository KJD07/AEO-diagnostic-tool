version: "3.9"

services:
  backend:
    build: ./backend
    container_name: aeo-backend
    ports:
      - "3001:3001"
    environment:
      - GOOGLE_AI_STUDIO_KEY=${GOOGLE_AI_STUDIO_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PORT=3001
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: aeo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
